<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览统计 - 商圈快讯</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>浏览统计</h1>
        <p>查看您发布的消息的浏览和互动情况</p>

        <!-- 统计概览 -->
        <div class="stats-overview">
            <div class="stat-card">
                <div class="stat-icon views">
                    <i data-lucide="eye"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="totalViews">0</div>
                    <div class="stat-label">总浏览量</div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon likes">
                    <i data-lucide="thumbs-up"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="totalLikes">0</div>
                    <div class="stat-label">总点赞数</div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon comments">
                    <i data-lucide="message-circle"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="totalComments">0</div>
                    <div class="stat-label">总评论数</div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon shares">
                    <i data-lucide="share-2"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="totalShares">0</div>
                    <div class="stat-label">总分享数</div>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-container">
            <!-- 日浏览量趋势图 -->
            <div class="chart-card">
                <h2>日浏览量趋势</h2>
                <div class="chart-wrapper">
                    <canvas id="dailyViewsChart"></canvas>
                </div>
            </div>

            <!-- 消息分类占比 -->
            <div class="chart-card">
                <h2>消息分类占比</h2>
                <div class="chart-wrapper">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <!-- 性别分布 -->
            <div class="chart-card">
                <h2>受众性别分布</h2>
                <div class="chart-wrapper">
                    <canvas id="genderChart"></canvas>
                </div>
            </div>

            <!-- 时段流量 -->
            <div class="chart-card">
                <h2>24小时流量分布</h2>
                <div class="chart-wrapper">
                    <canvas id="hourlyChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="btn-group">
            <a href="view-messages.html" class="btn btn-primary">
                <i data-lucide="message-square"></i> 查看消息
            </a>
            <a href="post-message.html" class="btn btn-secondary">
                <i data-lucide="plus"></i> 发布新消息
            </a>
            <a href="resident-view.html" class="btn btn-success">
                <i data-lucide="users"></i> 切换到居民端
            </a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 检查用户是否登录
            if (!App.isLoggedIn()) {
                alert('请先登录！');
                window.location.href = 'register.html';
                return;
            }

            // 加载统计数据
            loadStatistics();

            // 初始化Lucide图标
            lucide.createIcons();
        });

        // 加载统计数据
        function loadStatistics() {
            const statistics = App.getStatistics();

            // 更新统计数字
            document.getElementById('totalViews').textContent = statistics.totalViews;
            document.getElementById('totalLikes').textContent = statistics.totalLikes;
            document.getElementById('totalComments').textContent = statistics.totalComments;
            document.getElementById('totalShares').textContent = statistics.totalShares;

            // 初始化图表
            initDailyViewsChart(statistics.dailyViews);
            initCategoryChart(statistics.categoryRatio);
            initGenderChart(statistics.genderDistribution);
            initHourlyChart(statistics.hourlyTraffic);
        }

        // 初始化日浏览量趋势图
        function initDailyViewsChart(dailyViews) {
            const ctx = document.getElementById('dailyViewsChart').getContext('2d');
            
            const dates = dailyViews.map(item => item.date);
            const views = dailyViews.map(item => item.views);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '浏览量',
                        data: views,
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#4f46e5',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 10,
                            cornerRadius: 8,
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            displayColors: false
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        }
                    }
                }
            });
        }

        // 初始化消息分类占比图
        function initCategoryChart(categoryRatio) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            
            const categories = Object.keys(categoryRatio).map(key => {
                const labels = {
                    promotion: '促销活动',
                    event: '活动通知',
                    notice: '公告通知',
                    other: '其他类型'
                };
                return labels[key] || key;
            });
            
            const ratios = Object.values(categoryRatio);
            
            const colors = [
                '#4f46e5',
                '#10b981',
                '#f59e0b',
                '#6b7280'
            ];

            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: categories,
                    datasets: [{
                        data: ratios,
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 10,
                            cornerRadius: 8,
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            displayColors: true
                        }
                    }
                }
            });
        }

        // 初始化性别分布图
        function initGenderChart(genderDistribution) {
            const ctx = document.getElementById('genderChart').getContext('2d');
            
            const genders = ['男性', '女性'];
            const distributions = [genderDistribution.male, genderDistribution.female];
            
            const colors = ['#3b82f6', '#ec4899'];

            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: genders,
                    datasets: [{
                        data: distributions,
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 10,
                            cornerRadius: 8,
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            displayColors: true
                        }
                    },
                    cutout: '70%'
                }
            });
        }

        // 初始化24小时流量分布图
        function initHourlyChart(hourlyTraffic) {
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            
            const hours = Array.from({ length: 24 }, (_, i) => `${i}:00`);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: hours,
                    datasets: [{
                        label: '浏览量',
                        data: hourlyTraffic,
                        backgroundColor: '#4f46e5',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 10,
                            cornerRadius: 8,
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            displayColors: false
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                maxTicksLimit: 12
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
