<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家注册 - 商圈快讯</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <!-- 顶部logo和标题 -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center mb-4">
                <i data-lucide="shopping-bag" class="h-12 w-12 text-indigo-600 mr-2"></i>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">商圈快讯</h1>
            </div>
            <p class="text-gray-600 text-lg">真实门店认证 · 1分钟入驻 · 零成本营销</p>
        </div>
        
        <!-- 主容器 -->
        <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
            <!-- 进度指示器 -->
            <div class="flex items-center justify-between mb-8">
                <div class="flex-1 flex items-center">
                    <div class="progress-step w-10 h-10 rounded-full flex items-center justify-center bg-indigo-600 text-white font-medium active">1</div>
                    <div class="progress-line flex-grow bg-indigo-600"></div>
                    <div class="progress-step w-10 h-10 rounded-full flex items-center justify-center bg-gray-200 text-gray-600 font-medium">2</div>
                    <div class="progress-line flex-grow bg-gray-200"></div>
                    <div class="progress-step w-10 h-10 rounded-full flex items-center justify-center bg-gray-200 text-gray-600 font-medium">3</div>
                </div>
            </div>
            
            <!-- 注册表单 -->
            <form id="register-form" class="space-y-6">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">门店基本信息</h2>
                    <p class="text-gray-500 mt-1">1分钟快速入驻，基础功能永久免费，真实信息更容易被用户信赖</p>
                </div>
                
                <!-- 门店名称 -->
                <div>
                    <div class="flex items-center mb-2">
                        <i data-lucide="building-2" class="h-5 w-5 text-indigo-500 mr-2"></i>
                        <label for="store-name" class="block text-sm font-medium text-gray-700">门店名称</label>
                    </div>
                    <input type="text" id="store-name" name="store-name" required class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="请输入您的门店名称">
                </div>
                
                <!-- 负责人姓名 -->
                <div>
                    <div class="flex items-center mb-2">
                        <i data-lucide="user" class="h-5 w-5 text-indigo-500 mr-2"></i>
                        <label for="merchant-name" class="block text-sm font-medium text-gray-700">负责人姓名</label>
                    </div>
                    <input type="text" id="merchant-name" name="merchant-name" required class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="请输入负责人姓名">
                </div>
                
                <!-- 手机号码 -->
                <div>
                    <div class="flex items-center mb-2">
                        <i data-lucide="phone" class="h-5 w-5 text-indigo-500 mr-2"></i>
                        <label for="phone" class="block text-sm font-medium text-gray-700">手机号码</label>
                    </div>
                    <div class="flex space-x-3">
                        <input type="tel" id="phone" name="phone" required class="form-input flex-1 px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="请输入手机号码">
                        <button type="button" id="send-code-btn" class="px-4 py-3 border border-transparent text-sm font-medium rounded-lg shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 whitespace-nowrap">获取验证码</button>
                    </div>
                </div>
                
                <!-- 验证码 -->
                <div>
                    <div class="flex items-center mb-2">
                        <i data-lucide="shield-check" class="h-5 w-5 text-indigo-500 mr-2"></i>
                        <label for="verification-code" class="block text-sm font-medium text-gray-700">验证码</label>
                    </div>
                    <input type="text" id="verification-code" name="verification-code" required class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="请输入验证码">
                </div>
                
                <!-- 门店地址 -->
                <div>
                    <div class="flex items-center mb-2">
                        <i data-lucide="map-pin" class="h-5 w-5 text-indigo-500 mr-2"></i>
                        <label for="address" class="block text-sm font-medium text-gray-700">门店地址</label>
                    </div>
                    <input type="text" id="address" name="address" required class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="请输入详细门店地址">
                    <p class="text-xs text-gray-500 mt-1">系统将自动获取LBS位置，帮助您精准触达周边3公里客群</p>
                </div>
                <div class="form-group">
                    <label for="businessType">商家类型</label>
                    <select id="businessType" name="businessType" required>
                        <option value="">请选择商家类型</option>
                        <option value="restaurant">餐饮美食</option>
                        <option value="shopping">购物零售</option>
                        <option value="service">生活服务</option>
                        <option value="entertainment">休闲娱乐</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <!-- 营业执照 -->
                <div>
                    <div class="flex items-center mb-2">
                        <i data-lucide="file-document" class="h-5 w-5 text-indigo-500 mr-2"></i>
                        <label for="license" class="block text-sm font-medium text-gray-700">营业执照（可选）</label>
                    </div>
                    <div class="mt-1 flex justify-center px-6 pt-6 pb-8 border-2 border-dashed border-indigo-200 rounded-xl hover:border-indigo-400 transition-colors">
                        <div class="space-y-2 text-center">
                            <i data-lucide="upload-cloud" class="mx-auto h-14 w-14 text-indigo-400"></i>
                            <div class="flex flex-col text-sm text-gray-600">
                                <label for="license" class="relative cursor-pointer bg-gradient-to-r from-indigo-500 to-purple-500 rounded-lg text-white font-medium py-2 px-4 hover:from-indigo-600 hover:to-purple-600 transition-all transform hover:scale-105">
                                    <span>上传营业执照</span>
                                    <input id="license" name="license" type="file" class="sr-only" accept="image/*">
                                </label>
                                <p class="mt-2">或拖拽图片到此处</p>
                            </div>
                            <p class="text-xs text-gray-500">支持 PNG, JPG, WEBP 格式，大小不超过5MB</p>
                            <p class="text-xs text-green-600 mt-2 flex items-center justify-center">
                                <i data-lucide="check-circle" class="h-4 w-4 mr-1"></i>
                                认证后可提升门店可信度
                            </p>
                        </div>
                    </div>
                </div>
                
                <!-- 提交按钮 -->
                <button type="submit" class="w-full flex justify-center py-4 px-6 border border-transparent rounded-xl shadow-lg text-lg font-semibold text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all transform hover:scale-105">
                    注册并开始营销
                </button>
                
                <!-- 底部提示 -->
                <div class="text-center text-sm text-gray-500 mt-4">
                    <p>注册即表示您同意<a href="#" class="text-indigo-600 hover:text-indigo-800">《用户服务协议》</a>和<a href="#" class="text-indigo-600 hover:text-indigo-800">《隐私政策》</a></p>
                    <p class="mt-2">已有账号？<a href="#" class="text-indigo-600 font-medium hover:text-indigo-800">立即登录</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // 表单提交事件处理
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const formData = new FormData(this);
            const userData = {
                id: App.generateId(),
                businessName: formData.get('businessName'),
                contactName: formData.get('contactName'),
                phone: formData.get('phone'),
                email: formData.get('email'),
                businessType: formData.get('businessType'),
                address: formData.get('address'),
                role: 'merchant',
                registerTime: new Date().toISOString()
            };
            
            // 保存用户数据
            App.saveUserData(userData);
            
            // 显示注册成功消息
            const successMessage = document.createElement('div');
            successMessage.className = 'success-message';
            successMessage.innerHTML = '<i data-lucide="check-circle"></i> 注册成功！正在跳转到发布页面...';
            document.querySelector('.form-container').insertBefore(successMessage, this);
            
            // 初始化Lucide图标
            lucide.createIcons();
            
            // 3秒后跳转到发布消息页面
            setTimeout(() => {
                window.location.href = 'post-message.html';
            }, 1500);
        });
        
        // 初始化Lucide图标
        lucide.createIcons();
    </script>
</body>
</html>
