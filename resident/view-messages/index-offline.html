        .tag {

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
            justify-content: center;
            align-items: center;

        }
        .filter-btn {

            background-color: #f97316;
            color: white;
        }
        .activity-card {
            transition: all 0.2s;
        }
        .activity-card:hover {

        .icon-sm {

        function init() {
            loadActivities();
            setupEventListeners();
        }
        
        function setupEventListeners() {
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                currentSearch = e.target.value.toLowerCase();
                loadActivities();
            });
            
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    loadActivities();
                });
            });
        }
        
        function loadActivities() {
            const activityList = document.getElementById('activity-list');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty');
            
            activityList.innerHTML = '';
            loading.classList.remove('hidden');
            empty.classList.add('hidden');
            
            setTimeout(() => {
                loading.classList.add('hidden');
                
                let filteredActivities = activities;
                
                if (currentFilter !== 'all') {
                    filteredActivities = filteredActivities.filter(a => a.templateType === currentFilter);
                }
                
                if (currentSearch) {
                    filteredActivities = filteredActivities.filter(a => 
                        a.title.toLowerCase().includes(currentSearch) ||
                        a.merchantName.toLowerCase().includes(currentSearch) ||
                        a.tags.some(tag => tag.toLowerCase().includes(currentSearch))
                    );
                }
                
                if (filteredActivities.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }
                
                filteredActivities.forEach(activity => {
                    const card = createActivityCard(activity);
                    activityList.appendChild(card);
                });
            }, 500);
        }
        
        function createActivityCard(activity) {
            const card = document.createElement('div');
            card.className = 'activity-card bg-white rounded-xl shadow-sm overflow-hidden cursor-pointer';
            card.onclick = () => showActivityDetail(activity);
            
            const tagsHtml = activity.tags.map(tag => {
                const tagClass = getTagClass(tag);
                return `<span class="tag ${tagClass}">${tag}</span>`;
            }).join('');
            
            card.innerHTML = `
                <img src="${activity.coverImage}" alt="${activity.title}" class="w-full h-48 object-cover">
                <div class="p-4">
                    <div class="flex items-center mb-2">
                        <img src="${activity.merchantAvatar}" alt="${activity.merchantName}" class="w-8 h-8 rounded-full mr-2">
                        <span class="text-sm text-gray-600">${activity.merchantName}</span>
                        <span class="text-xs text-gray-400 ml-auto">${activity.distance}</span>
                    </div>
                    <h3 class="font-bold text-gray-900 mb-2 line-clamp-2">${activity.title}</h3>
                    <div class="mb-2">
                        ${tagsHtml}
                    </div>
                    <div class="flex items-center text-xs text-gray-500">
                        <span class="flex items-center mr-3">
                            <svg class="icon-sm mr-1" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            ${activity.views}
                        </span>
                        <span class="flex items-center mr-3">
                            <svg class="icon-sm mr-1" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            ${activity.likes}
                        </span>
                        <span class="flex items-center">
                            <svg class="icon-sm mr-1" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                            ${activity.comments}
                        </span>
                    </div>
                </div>
            `;
            
            return card;
        }
        
        function getTagClass(tag) {
            const tagClasses = {
                '限时折扣': 'tag-orange',
                '新店开业': 'tag-blue',
                '上门服务': 'tag-green',
                '拼团集赞': 'tag-purple',
                '会员专享': 'tag-red',
                '生鲜': 'tag-orange',
                '美容': 'tag-purple',
                '家政': 'tag-green',
                '亲子': 'tag-blue',
                '零售': 'tag-red',
                '特价': 'tag-orange',
                '5折': 'tag-orange',
                '预约': 'tag-green',
                '教育': 'tag-blue',
                '积分兑换': 'tag-red'
            };
            return tagClasses[tag] || 'tag-blue';
        }
        
        function showActivityDetail(activity) {
            localStorage.setItem('currentActivity', JSON.stringify(activity));
            window.location.href = 'detail-offline.html';
        }
        
        function showLocationModal() {
            document.getElementById('location-modal').classList.add('show');
        }
        
        function hideLocationModal() {
            document.getElementById('location-modal').classList.remove('show');
        }
        
        function selectCommunity(community) {
            currentCommunity = community;
            showToast(`已切换到${community}`);
            hideLocationModal();
            loadActivities();
        }
        
        function showMerchantSwitch() {
            window.location.href = '../../merchant/login-offline.html';
        }
        
        function showCollections() {
            window.location.href = 'collections-offline.html';
        }
        
        function showOrders() {
            window.location.href = 'orders-offline.html';
        }
        
        function showProfile() {
            window.location.href = 'profile-offline.html';
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        init();
    </script>
</body>
</html>
