    <style>
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            margin-right: 4px;
            margin-bottom: 4px;
        }
        .tag-orange { background-color: #fff7ed; color: #ea580c; }
        .tag-blue { background-color: #eff6ff; color: #2563eb; }
        .tag-green { background-color: #f0fdf4; color: #16a34a; }
        .tag-purple { background-color: #faf5ff; color: #9333ea; }
        .tag-red { background-color: #fef2f2; color: #dc2626; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        .collection-card {
            transition: all 0.2s;
        }
        .collection-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .icon-sm {
            width: 16px;
            height: 16px;
        }
    </style>

        function init() {
            loadCollections();
        }
        
        function loadCollections() {
            const collectionList = document.getElementById('collection-list');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty');
            
            collectionList.innerHTML = '';
            loading.classList.remove('hidden');
            empty.classList.add('hidden');
            
            setTimeout(() => {
                loading.classList.add('hidden');
                
                const collectionIds = JSON.parse(localStorage.getItem('collections') || '[]');
                
                if (collectionIds.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }
                
                const collectedActivities = activities.filter(activity => 
                    collectionIds.includes(activity.id)
                );
                
                collectedActivities.forEach(activity => {
                    const card = createCollectionCard(activity);
                    collectionList.appendChild(card);
                });
            }, 500);
        }
        
        function createCollectionCard(activity) {
            const card = document.createElement('div');
            card.className = 'collection-card bg-white rounded-xl shadow-sm overflow-hidden';
            
            const tagsHtml = activity.tags.map(tag => {
                const tagClass = getTagClass(tag);
                return `<span class="tag ${tagClass}">${tag}</span>`;
            }).join('');
            
            card.innerHTML = `
                <div class="flex">
                    <img src="${activity.coverImage}" alt="${activity.title}" class="w-32 h-32 object-cover">
                    <div class="flex-1 p-4">
                        <div class="flex items-start justify-between mb-2">
                            <h3 class="font-bold text-gray-900 text-sm line-clamp-2 flex-1 mr-2">${activity.title}</h3>
                            <button onclick="removeCollection(${activity.id})" class="p-1 hover:bg-gray-100 rounded">
                                <svg class="icon-sm text-red-500" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                            </button>
                        </div>
                        <div class="flex items-center mb-2">
                            <img src="${activity.merchantAvatar}" alt="${activity.merchantName}" class="w-6 h-6 rounded-full mr-2">
                            <span class="text-xs text-gray-600">${activity.merchantName}</span>
                            <span class="text-xs text-gray-400 ml-auto">${activity.distance}</span>
                        </div>
                        <div class="mb-2">
                            ${tagsHtml}
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center text-xs text-gray-500">
                                <span class="flex items-center mr-2">
                                    <svg class="icon-sm mr-1" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    ${activity.views}
                                </span>
                                <span class="flex items-center">
                                    <svg class="icon-sm mr-1" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                                    ${activity.likes}
                                </span>
                            </div>
                            <button onclick="viewActivity(${activity.id})" class="px-3 py-1.5 bg-orange-100 text-orange-700 rounded-lg text-xs font-medium hover:bg-orange-200">
                                查看
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            return card;
        }
        
        function getTagClass(tag) {
            const tagClasses = {
                '限时折扣': 'tag-orange',
                '新店开业': 'tag-blue',
                '上门服务': 'tag-green',
                '拼团集赞': 'tag-purple',
                '会员专享': 'tag-red',
                '生鲜': 'tag-orange',
                '美容': 'tag-purple',
                '家政': 'tag-green',
                '亲子': 'tag-blue',
                '零售': 'tag-red',
                '特价': 'tag-orange',
                '5折': 'tag-orange',
                '预约': 'tag-green',
                '教育': 'tag-blue',
                '积分兑换': 'tag-red'
            };
            return tagClasses[tag] || 'tag-blue';
        }
        
        function viewActivity(activityId) {
            const activity = activities.find(a => a.id === activityId);
            if (activity) {
                localStorage.setItem('currentActivity', JSON.stringify(activity));
                window.location.href = 'detail-offline.html';
            }
        }
        
        function removeCollection(activityId) {
            if (!confirm('确定要取消收藏吗？')) {
                return;
            }
            
            const collections = JSON.parse(localStorage.getItem('collections') || '[]');
            const index = collections.indexOf(activityId);
            
            if (index > -1) {
                collections.splice(index, 1);
                localStorage.setItem('collections', JSON.stringify(collections));
                
                showToast('已取消收藏');
                loadCollections();
            }
        }
        
        function clearAllCollections() {
            if (!confirm('确定要清空所有收藏吗？')) {
                return;
            }
            
            localStorage.setItem('collections', '[]');
            showToast('已清空所有收藏');
            loadCollections();
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        init();
    </script>
