<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 邻盟营销助手</title>
    <link rel="stylesheet" href="../../css/output.css">
    <style>
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        .order-card {
            transition: all 0.2s;
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .icon-sm {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white sticky top-0 z-50 shadow-sm">
            <div class="px-4 py-3">
                <div class="flex items-center justify-between">
                    <button onclick="window.history.back()" class="p-2 hover:bg-gray-100 rounded-lg">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </button>
                    <h1 class="text-lg font-bold text-gray-900">我的订单</h1>
                    <div class="w-10"></div>
                </div>
                
                <div class="flex space-x-2 mt-3">
                    <button class="order-filter active px-4 py-2 bg-orange-600 text-white rounded-lg text-sm font-medium" data-status="all">全部</button>
                    <button class="order-filter px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium" data-status="0">待处理</button>
                    <button class="order-filter px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium" data-status="1">已确认</button>
                    <button class="order-filter px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium" data-status="2">已完成</button>
                    <button class="order-filter px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium" data-status="3">已取消</button>
                </div>
            </div>
        </div>
        
        <div class="p-4">
            <div id="order-list" class="space-y-4">
            </div>
            
            <div id="loading" class="hidden text-center py-8">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-orange-600"></div>
                <p class="text-gray-500 mt-2">加载中...</p>
            </div>
            
            <div id="empty" class="hidden text-center py-12">
                <svg class="icon-lg text-gray-400 mx-auto mb-4" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <p class="text-gray-500">暂无订单</p>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <div id="order-detail-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-md w-full max-h-[80vh] overflow-y-auto">
            <div class="p-4 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold text-gray-900">订单详情</h3>
                    <button onclick="hideOrderDetail()" class="p-2 hover:bg-gray-100 rounded-lg">
                        <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            </div>
            <div id="order-detail-content" class="p-4">
            </div>
        </div>
    </div>
    
    <script>
        let currentStatus = 'all';
        
        const statusNames = {
            0: '待处理',
            1: '已确认',
            2: '已完成',
            3: '已取消'
        };
        
        const statusColors = {
            0: 'bg-yellow-100 text-yellow-700',
            1: 'bg-blue-100 text-blue-700',
            2: 'bg-green-100 text-green-700',
            3: 'bg-gray-100 text-gray-700'
        };
        
        function init() {
            loadOrders();
            setupEventListeners();
        }
        
        function setupEventListeners() {
            const orderFilters = document.querySelectorAll('.order-filter');
            orderFilters.forEach(filter => {
                filter.addEventListener('click', () => {
                    orderFilters.forEach(f => {
                        f.classList.remove('active', 'bg-orange-600', 'text-white');
                        f.classList.add('bg-gray-200', 'text-gray-700');
                    });
                    filter.classList.add('active', 'bg-orange-600', 'text-white');
                    filter.classList.remove('bg-gray-200', 'text-gray-700');
                    
                    currentStatus = filter.dataset.status;
                    loadOrders();
                });
            });
        }
        
        function loadOrders() {
            const orderList = document.getElementById('order-list');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty');
            
            orderList.innerHTML = '';
            loading.classList.remove('hidden');
            empty.classList.add('hidden');
            
            setTimeout(() => {
                loading.classList.add('hidden');
                
                const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                
                let filteredOrders = orders;
                if (currentStatus !== 'all') {
                    filteredOrders = orders.filter(order => order.status === parseInt(currentStatus));
                }
                
                if (filteredOrders.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }
                
                filteredOrders.forEach(order => {
                    const card = createOrderCard(order);
                    orderList.appendChild(card);
                });
            }, 500);
        }
        
        function createOrderCard(order) {
            const card = document.createElement('div');
            card.className = 'order-card bg-white rounded-xl shadow-sm p-4 cursor-pointer';
            card.onclick = () => showOrderDetail(order);
            
            const createTime = new Date(order.createTime).toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            card.innerHTML = `
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-orange-100 rounded-lg flex items-center justify-center mr-3">
                            <svg class="icon text-orange-600" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                        </div>
                        <div>
                            <p class="font-medium text-gray-900">${order.merchantName}</p>
                            <p class="text-xs text-gray-500">订单号：${order.id}</p>
                        </div>
                    </div>
                    <span class="px-3 py-1 rounded-full text-xs font-medium ${statusColors[order.status]}">${statusNames[order.status]}</span>
                </div>
                
                <div class="mb-3">
                    <p class="text-sm text-gray-700 line-clamp-2">${order.orderContent}</p>
                    <p class="text-xs text-gray-500 mt-1">数量：${order.quantity}</p>
                </div>
                
                <div class="flex items-center justify-between">
                    <p class="text-xs text-gray-500">${createTime}</p>
                    <div class="flex space-x-2">
                        ${order.status === 0 ? `
                            <button onclick="event.stopPropagation(); cancelOrder(${order.id})" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200">
                                取消订单
                            </button>
                            <button onclick="event.stopPropagation(); contactMerchant(${order.id})" class="px-3 py-1.5 bg-orange-100 text-orange-700 rounded-lg text-sm font-medium hover:bg-orange-200">
                                联系商家
                            </button>
                        ` : ''}
                        ${order.status === 2 ? `
                            <button onclick="event.stopPropagation(); showOrderDetail(${JSON.stringify(order).replace(/"/g, '&quot;')})" class="px-3 py-1.5 bg-orange-100 text-orange-700 rounded-lg text-sm font-medium hover:bg-orange-200">
                                再次购买
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
            
            return card;
        }
        
        function showOrderDetail(order) {
            const modal = document.getElementById('order-detail-modal');
            const content = document.getElementById('order-detail-content');
            
            const createTime = new Date(order.createTime).toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            content.innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-sm text-gray-500">订单状态</span>
                        <span class="px-3 py-1 rounded-full text-xs font-medium ${statusColors[order.status]}">${statusNames[order.status]}</span>
                    </div>
                    
                    <div class="border-t border-gray-200 pt-4">
                        <h4 class="font-medium text-gray-900 mb-2">订单信息</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-500">订单号</span>
                                <span class="text-gray-900">${order.id}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-500">下单时间</span>
                                <span class="text-gray-900">${createTime}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="border-t border-gray-200 pt-4">
                        <h4 class="font-medium text-gray-900 mb-2">商家信息</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-500">商家名称</span>
                                <span class="text-gray-900">${order.merchantName}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="border-t border-gray-200 pt-4">
                        <h4 class="font-medium text-gray-900 mb-2">订单内容</h4>
                        <p class="text-sm text-gray-700">${order.orderContent}</p>
                        <p class="text-sm text-gray-500 mt-2">数量：${order.quantity}</p>
                    </div>
                    
                    <div class="border-t border-gray-200 pt-4">
                        <h4 class="font-medium text-gray-900 mb-2">联系信息</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-500">联系人</span>
                                <span class="text-gray-900">${order.contactName}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-500">联系电话</span>
                                <span class="text-gray-900">${order.contactPhone}</span>
                            </div>
                        </div>
                    </div>
                    
                    ${order.status === 0 ? `
                        <div class="border-t border-gray-200 pt-4">
                            <div class="flex space-x-3">
                                <button onclick="cancelOrder(${order.id})" class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200">
                                    取消订单
                                </button>
                                <button onclick="contactMerchant(${order.id})" class="flex-1 px-4 py-2 bg-orange-600 text-white rounded-lg font-medium hover:bg-orange-700">
                                    联系商家
                                </button>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            
            modal.classList.remove('hidden');
        }
        
        function hideOrderDetail() {
            document.getElementById('order-detail-modal').classList.add('hidden');
        }
        
        function cancelOrder(orderId) {
            if (!confirm('确定要取消这个订单吗？')) {
                return;
            }
            
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const orderIndex = orders.findIndex(o => o.id === orderId);
            
            if (orderIndex > -1) {
                orders[orderIndex].status = 3;
                localStorage.setItem('orders', JSON.stringify(orders));
                
                showToast('订单已取消');
                hideOrderDetail();
                loadOrders();
            }
        }
        
        function contactMerchant(orderId) {
            showToast('商家联系方式：13800138000');
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        init();
    </script>
</body>
</html>
