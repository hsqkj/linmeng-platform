<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 邻盟营销助手</title>
    <link rel="stylesheet" href="../../css/output.css">
    <style>
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        .menu-item {
            transition: all 0.2s;
        }
        .menu-item:hover {
            background-color: #f9fafb;
        }
        
        .icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .icon-lg {
            width: 32px;
            height: 32px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white sticky top-0 z-50 shadow-sm">
            <div class="px-4 py-3">
                <div class="flex items-center justify-between">
                    <button onclick="window.history.back()" class="p-2 hover:bg-gray-100 rounded-lg">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </button>
                    <h1 class="text-lg font-bold text-gray-900">个人中心</h1>
                    <div class="w-10"></div>
                </div>
            </div>
        </div>
        
        <div class="p-4">
            <div class="bg-white rounded-xl shadow-sm p-6 mb-4">
                <div class="flex items-center">
                    <div class="w-20 h-20 bg-gradient-to-br from-orange-400 to-red-500 rounded-full flex items-center justify-center mr-4">
                        <span class="text-3xl font-bold text-white">邻</span>
                    </div>
                    <div class="flex-1">
                        <h2 class="text-xl font-bold text-gray-900 mb-1">邻盟用户</h2>
                        <p class="text-sm text-gray-500 mb-2">138****8888</p>
                        <div class="flex items-center space-x-2">
                            <span class="px-2 py-1 bg-orange-100 text-orange-700 rounded text-xs">普通用户</span>
                        </div>
                    </div>
                    <button onclick="editProfile()" class="p-2 hover:bg-gray-100 rounded-lg">
                        <svg class="icon text-gray-600" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-sm mb-4">
                <div class="grid grid-cols-3 divide-x divide-gray-200">
                    <div class="p-4 text-center cursor-pointer" onclick="showCollections()">
                        <p class="text-2xl font-bold text-gray-900" id="collection-count">0</p>
                        <p class="text-sm text-gray-500">收藏</p>
                    </div>
                    <div class="p-4 text-center cursor-pointer" onclick="showOrders()">
                        <p class="text-2xl font-bold text-gray-900" id="order-count">0</p>
                        <p class="text-sm text-gray-500">订单</p>
                    </div>
                    <div class="p-4 text-center cursor-pointer" onclick="showConsultations()">
                        <p class="text-2xl font-bold text-gray-900" id="consultation-count">0</p>
                        <p class="text-sm text-gray-500">咨询</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-sm mb-4">
                <div class="menu-item flex items-center justify-between p-4 cursor-pointer border-b border-gray-100" onclick="showCollections()">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-red-100 rounded-lg flex items-center justify-center mr-3">
                            <svg class="icon text-red-600" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                        </div>
                        <div>
                            <p class="font-medium text-gray-900">我的收藏</p>
                            <p class="text-xs text-gray-500">查看收藏的活动</p>
                        </div>
                    </div>
                    <svg class="icon text-gray-400" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </div>
                
                <div class="menu-item flex items-center justify-between p-4 cursor-pointer border-b border-gray-100" onclick="showOrders()">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-orange-100 rounded-lg flex items-center justify-center mr-3">
                            <svg class="icon text-orange-600" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                        </div>
                        <div>
                            <p class="font-medium text-gray-900">我的订单</p>
                            <p class="text-xs text-gray-500">查看订单状态</p>
                        </div>
                    </div>
                    <svg class="icon text-gray-400" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </div>
                
                <div class="menu-item flex items-center justify-between p-4 cursor-pointer" onclick="showConsultations()">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center mr-3">
                            <svg class="icon text-green-600" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        </div>
                        <div>
                            <p class="font-medium text-gray-900">我的咨询</p>
                            <p class="text-xs text-gray-500">查看咨询记录</p>
                        </div>
                    </div>
                    <svg class="icon text-gray-400" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-sm mb-4">
                <div class="menu-item flex items-center justify-between p-4 cursor-pointer border-b border-gray-100" onclick="showSettings()">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center mr-3">
                            <svg class="icon text-blue-600" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        </div>
                        <div>
                            <p class="font-medium text-gray-900">设置</p>
                            <p class="text-xs text-gray-500">账号、通知、隐私</p>
                        </div>
                    </div>
                    <svg class="icon text-gray-400" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </div>
                
                <div class="menu-item flex items-center justify-between p-4 cursor-pointer border-b border-gray-100" onclick="showHelp()">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center mr-3">
                            <svg class="icon text-purple-600" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        </div>
                        <div>
                            <p class="font-medium text-gray-900">帮助与反馈</p>
                            <p class="text-xs text-gray-500">常见问题、意见反馈</p>
                        </div>
                    </div>
                    <svg class="icon text-gray-400" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </div>
                
                <div class="menu-item flex items-center justify-between p-4 cursor-pointer" onclick="showAbout()">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center mr-3">
                            <svg class="icon text-gray-600" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                        </div>
                        <div>
                            <p class="font-medium text-gray-900">关于</p>
                            <p class="text-xs text-gray-500">版本信息、联系方式</p>
                        </div>
                    </div>
                    <svg class="icon text-gray-400" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </div>
            </div>
            
            <button onclick="switchToMerchant()" class="w-full bg-white rounded-xl shadow-sm p-4 text-orange-600 font-medium hover:bg-gray-50 transition-colors">
                切换到商家端
            </button>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        function init() {
            loadStatistics();
        }
        
        function loadStatistics() {
            const collections = JSON.parse(localStorage.getItem('collections') || '[]');
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const consultations = JSON.parse(localStorage.getItem('consultations') || '[]');
            
            document.getElementById('collection-count').textContent = collections.length;
            document.getElementById('order-count').textContent = orders.length;
            document.getElementById('consultation-count').textContent = consultations.length;
        }
        
        function editProfile() {
            showToast('编辑资料功能开发中');
        }
        
        function showCollections() {
            window.location.href = 'collections-offline.html';
        }
        
        function showOrders() {
            window.location.href = 'orders-offline.html';
        }
        
        function showConsultations() {
            showToast('咨询记录功能开发中');
        }
        
        function showSettings() {
            showToast('设置功能开发中');
        }
        
        function showHelp() {
            showToast('帮助与反馈功能开发中');
        }
        
        function showAbout() {
            showToast('邻盟营销助手 v1.0.0');
        }
        
        function switchToMerchant() {
            window.location.href = '../post-message/index-offline.html';
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        init();
    </script>
</body>
</html>
