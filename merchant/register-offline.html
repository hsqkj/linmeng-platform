<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家注册 - 邻盟营销助手</title>
    <link rel="stylesheet" href="../css/output.css">
    <style>
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        
        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        .step-item {
            flex: 1;
            text-align: center;
            position: relative;
        }
        .step-item::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 100%;
            width: 100%;
            height: 2px;
            background-color: #e5e7eb;
            z-index: 1;
        }
        .step-item:last-child::after {
            display: none;
        }
        .step-item.active::after {
            background-color: #f97316;
        }
        .step-number {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #e5e7eb;
            color: #4b5563;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.5rem;
            position: relative;
            z-index: 2;
            font-weight: 600;
            font-size: 0.75rem;
        }
        .step-item.active .step-number {
            background-color: #f97316;
            color: white;
        }
        .step-item.completed .step-number {
            background-color: #10b981;
            color: white;
        }
        .step-text {
            font-size: 0.75rem;
            color: #6b7280;
        }
        .step-item.active .step-text {
            color: #f97316;
            font-weight: 500;
        }
        
        .icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-red-50 min-h-screen">
    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        <div class="flex-1 p-6">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-gradient-to-br from-orange-400 to-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <svg class="icon text-white" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </div>
                <h1 class="text-xl font-bold text-gray-900 mb-1">商家注册</h1>
                <p class="text-sm text-gray-600">两步快速完成注册</p>
            </div>
            
            <div class="step-indicator">
                <div class="step-item active" data-step="1">
                    <div class="step-number">1</div>
                    <div class="step-text">账号信息</div>
                </div>
                <div class="step-item" data-step="2">
                    <div class="step-number">2</div>
                    <div class="step-text">店铺信息</div>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <!-- 步骤1：账号信息 -->
                <div id="step-1" class="form-step">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">账号信息</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">手机号 <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="icon text-gray-400" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                </div>
                                <input type="tel" id="phone" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" placeholder="请输入手机号" required>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">验证码 <span class="text-red-500">*</span></label>
                            <div class="flex space-x-2">
                                <input type="text" id="verify-code" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" placeholder="请输入验证码" required>
                                <button type="button" onclick="sendVerifyCode()" id="send-code-btn" class="px-4 py-3 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition-colors whitespace-nowrap">
                                    获取验证码
                                </button>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">密码 <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="icon text-gray-400" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                </div>
                                <input type="password" id="password" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" placeholder="请设置密码（6-20位）" required>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">密码长度6-20位，建议包含字母和数字</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">确认密码 <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="icon text-gray-400" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                </div>
                                <input type="password" id="confirm-password" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" placeholder="请再次输入密码" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6">
                        <button onclick="nextStep(1)" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-lg font-medium hover:from-orange-600 hover:to-red-600 transition-all shadow-md">
                            下一步
                        </button>
                    </div>
                </div>
                
                <!-- 步骤2：店铺信息 -->
                <div id="step-2" class="form-step hidden">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">店铺信息</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">店铺名称 <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="icon text-gray-400" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                </div>
                                <input type="text" id="shop-name" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" placeholder="请输入店铺名称" required>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">所属行业 <span class="text-red-500">*</span></label>
                            <select id="industry" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" required>
                                <option value="">请选择行业</option>
                                <option value="生鲜">生鲜</option>
                                <option value="餐饮">餐饮</option>
                                <option value="零售">零售</option>
                                <option value="美容">美容</option>
                                <option value="家政">家政</option>
                                <option value="教育">教育</option>
                                <option value="医疗">医疗</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        
                        <!-- 地图定位 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">店铺位置 <span class="text-red-500">*</span></label>
                            <div class="space-y-3">
                                <!-- 地图区域 -->
                                <div id="map-container" class="w-full h-40 bg-gray-100 rounded-lg border-2 border-dashed border-gray-300 flex items-center justify-center relative overflow-hidden">
                                    <div class="text-center">
                                        <svg class="icon mx-auto mb-2 text-gray-400" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                        <p class="text-sm text-gray-500">点击定位店铺位置</p>
                                    </div>
                                    <button type="button" onclick="openMapLocator()" class="absolute inset-0 w-full h-full bg-transparent"></button>
                                </div>
                                <!-- 已选位置显示 -->
                                <div id="selected-location" class="hidden bg-orange-50 border border-orange-200 rounded-lg p-3">
                                    <div class="flex items-start">
                                        <svg class="icon text-orange-500 mt-0.5 mr-2 flex-shrink-0" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                        <div class="flex-1 min-w-0">
                                            <p class="text-sm font-medium text-gray-900" id="location-name">位置名称</p>
                                            <p class="text-xs text-gray-500 truncate" id="location-address">详细地址</p>
                                        </div>
                                        <button type="button" onclick="clearLocation()" class="text-gray-400 hover:text-red-500 ml-2">
                                            <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 详细地址 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">详细地址 <span class="text-red-500">*</span></label>
                            <input type="text" id="address" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" placeholder="请输入门牌号、楼层等详细地址" required>
                        </div>
                        
                        <!-- 所在社区 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">所在社区 <span class="text-red-500">*</span></label>
                            <select id="community" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" required>
                                <option value="">请选择所在社区</option>
                                <option value="阳光社区">阳光社区</option>
                                <option value="和谐社区">和谐社区</option>
                                <option value="幸福社区">幸福社区</option>
                                <option value="文明社区">文明社区</option>
                                <option value="繁荣社区">繁荣社区</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        
                        <!-- 门头照片/Logo 上传 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">门头照片或Logo <span class="text-gray-400 font-normal">（选填）</span></label>
                            <div class="space-y-3">
                                <!-- 上传按钮 -->
                                <div class="flex space-x-3">
                                    <label class="flex-1 cursor-pointer">
                                        <input type="file" id="shop-logo-input" accept="image/*" class="hidden" onchange="handleLogoUpload(event)">
                                        <div class="border-2 border-dashed border-orange-300 rounded-lg p-4 text-center hover:bg-orange-50 transition-colors">
                                            <svg class="icon mx-auto mb-2 text-orange-400" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                            <span class="text-sm text-orange-600 font-medium">上传门头照片/Logo</span>
                                            <p class="text-xs text-gray-400 mt-1">支持 JPG、PNG 格式</p>
                                        </div>
                                    </label>
                                </div>
                                
                                <!-- 预览区域 -->
                                <div id="logo-preview-container" class="hidden">
                                    <div class="relative inline-block">
                                        <img id="logo-preview" src="" alt="Logo预览" class="w-32 h-32 object-contain rounded-lg border border-gray-200 bg-gray-50">
                                        <button type="button" onclick="removeLogo()" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center text-xs hover:bg-red-600 transition-colors">
                                            ×
                                        </button>
                                    </div>
                                    <p class="text-xs text-gray-500 mt-1">点击图片可更换</p>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">营业时间</label>
                            <div class="flex items-center space-x-2">
                                <input type="time" id="open-time" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" value="08:00">
                                <span class="text-gray-500">至</span>
                                <input type="time" id="close-time" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" value="22:00">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6 flex space-x-3">
                        <button onclick="prevStep(2)" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition-colors">
                            上一步
                        </button>
                        <button onclick="nextStep(2)" class="flex-1 py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-lg font-medium hover:from-orange-600 hover:to-red-600 transition-all shadow-md">
                            下一步
                        </button>
                    </div>
                </div>
                
            </div>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    已有账号？
                    <a href="login-offline.html" class="text-orange-600 hover:text-orange-700 font-medium">立即登录</a>
                </p>
            </div>
            
            <div class="mt-4 text-center">
                <button onclick="switchToUser()" class="text-sm text-gray-500 hover:text-gray-700">
                    ← 切换到用户端
                </button>
            </div>
        </div>
        
        <div class="p-4 text-center">
            <p class="text-xs text-gray-400">© 2026 邻盟营销助手 版权所有</p>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        let currentStep = 1;
        let formData = {};
        let countdown = 0;
        
        function init() {
            // 检查是否是编辑模式
            const urlParams = new URLSearchParams(window.location.search);
            const isEditMode = urlParams.get('edit') === '1';
            
            if (isEditMode) {
                // 编辑模式：加载当前商户信息
                const currentMerchant = localStorage.getItem('current_merchant');
                if (currentMerchant) {
                    const merchant = JSON.parse(currentMerchant);
                    loadMerchantInfo(merchant);
                    // 直接显示第二步（店铺信息）
                    showEditMode();
                    return;
                }
            }
            
            // 检查是否已登录（正常注册流程）
            const currentMerchant = localStorage.getItem('current_merchant');
            if (currentMerchant) {
                window.location.href = 'post-message/index-offline.html';
                return;
            }
        }
        
        // 加载商户信息到表单
        function loadMerchantInfo(merchant) {
            document.getElementById('shop-name').value = merchant.name || '';
            document.getElementById('industry').value = merchant.industry || '';
            document.getElementById('address').value = merchant.address || '';
            if (merchant.logo) {
                formData.logo = merchant.logo;
                document.getElementById('logo-preview').src = merchant.logo;
                document.getElementById('logo-preview-container').classList.remove('hidden');
            }
            if (merchant.businessHours) {
                const hours = merchant.businessHours.split('-');
                if (hours.length === 2) {
                    document.getElementById('open-time').value = hours[0];
                    document.getElementById('close-time').value = hours[1];
                }
            }
            if (merchant.community) {
                document.getElementById('community').value = merchant.community;
            }
            if (merchant.location) {
                formData.location = merchant.location;
                showSelectedLocation(merchant.location);
            }
        }
        
        // 打开地图定位
        function openMapLocator() {
            // 使用微信内置地图或浏览器地理定位
            if (navigator.geolocation) {
                showToast('正在获取位置信息...');
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        
                        // 模拟获取位置名称（实际项目中应该调用地图API进行逆地理编码）
                        const locationName = `当前位置 (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
                        const locationAddress = `纬度: ${lat.toFixed(6)}, 经度: ${lng.toFixed(6)}`;
                        
                        formData.location = {
                            lat: lat,
                            lng: lng,
                            name: locationName,
                            address: locationAddress
                        };
                        
                        showSelectedLocation(formData.location);
                        showToast('定位成功！');
                    },
                    (error) => {
                        console.error('定位失败:', error);
                        showToast('定位失败，请手动输入地址');
                        
                        // 模拟定位（用于测试）
                        simulateLocation();
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            } else {
                showToast('您的浏览器不支持地理定位');
                simulateLocation();
            }
        }
        
        // 模拟定位（用于测试）
        function simulateLocation() {
            formData.location = {
                lat: 39.9042,
                lng: 116.4074,
                name: '北京市中心',
                address: '北京市东城区'
            };
            showSelectedLocation(formData.location);
        }
        
        // 显示已选位置
        function showSelectedLocation(location) {
            document.getElementById('location-name').textContent = location.name;
            document.getElementById('location-address').textContent = location.address;
            document.getElementById('selected-location').classList.remove('hidden');
            
            // 更新地图容器样式
            const mapContainer = document.getElementById('map-container');
            mapContainer.classList.remove('border-dashed', 'border-gray-300');
            mapContainer.classList.add('border-solid', 'border-orange-300');
            mapContainer.innerHTML = `
                <div class="absolute inset-0 bg-gradient-to-br from-orange-100 to-orange-50 flex items-center justify-center">
                    <div class="text-center">
                        <svg class="icon mx-auto mb-2 text-orange-500" style="width: 32px; height: 32px;" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        <p class="text-sm font-medium text-orange-700">已选择位置</p>
                        <p class="text-xs text-orange-600 mt-1">${location.name}</p>
                    </div>
                </div>
                <button type="button" onclick="openMapLocator()" class="absolute inset-0 w-full h-full bg-transparent"></button>
            `;
        }
        
        // 清除位置
        function clearLocation() {
            formData.location = null;
            document.getElementById('selected-location').classList.add('hidden');
            
            // 恢复地图容器样式
            const mapContainer = document.getElementById('map-container');
            mapContainer.classList.add('border-dashed', 'border-gray-300');
            mapContainer.classList.remove('border-solid', 'border-orange-300');
            mapContainer.innerHTML = `
                <div class="text-center">
                    <svg class="icon mx-auto mb-2 text-gray-400" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    <p class="text-sm text-gray-500">点击定位店铺位置</p>
                </div>
                <button type="button" onclick="openMapLocator()" class="absolute inset-0 w-full h-full bg-transparent"></button>
            `;
        }
        
        // 显示编辑模式（直接显示第二步）
        function showEditMode() {
            // 隐藏第一步
            document.getElementById('step-1').classList.add('hidden');
            // 显示第二步
            document.getElementById('step-2').classList.remove('hidden');
            // 更新步骤指示器
            document.querySelector('.step-item[data-step="1"]').classList.add('completed');
            document.querySelector('.step-item[data-step="2"]').classList.add('active');
            currentStep = 2;
            
            // 修改页面标题
            document.querySelector('h1').textContent = '完善店铺信息';
            document.querySelector('p.text-sm.text-gray-600').textContent = '请完善您的店铺信息';
            
            // 修改第二步标题
            document.querySelector('#step-2 h2').textContent = '完善店铺信息';
            
            // 修改按钮文字
            const nextBtn = document.querySelector('#step-2 button[onclick="nextStep(2)"]');
            if (nextBtn) {
                nextBtn.textContent = '保存信息';
            }
        }
        
        function nextStep(step) {
            if (step === 1) {
                // 验证第一步
                const phone = document.getElementById('phone').value.trim();
                const verifyCode = document.getElementById('verify-code').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                
                if (!phone) {
                    showToast('请输入手机号');
                    return;
                }
                
                if (!/^1[3-9]\d{9}$/.test(phone)) {
                    showToast('请输入正确的手机号');
                    return;
                }
                
                // 检查手机号是否已注册
                const merchants = JSON.parse(localStorage.getItem('merchants') || '[]');
                if (merchants.find(m => m.phone === phone)) {
                    showToast('该手机号已注册，请直接登录');
                    return;
                }
                
                if (!verifyCode) {
                    showToast('请输入验证码');
                    return;
                }
                
                // 模拟验证码验证（实际项目中需要后端验证）
                if (verifyCode !== '123456') {
                    showToast('验证码错误，测试验证码：123456');
                    return;
                }
                
                if (!password) {
                    showToast('请设置密码');
                    return;
                }
                
                if (password.length < 6 || password.length > 20) {
                    showToast('密码长度应为6-20位');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showToast('两次输入的密码不一致');
                    return;
                }
                
                formData.phone = phone;
                formData.password = password;
                
            } else if (step === 2) {
                // 验证第二步
                const shopName = document.getElementById('shop-name').value.trim();
                const industry = document.getElementById('industry').value;
                const address = document.getElementById('address').value.trim();
                const community = document.getElementById('community').value;
                
                if (!shopName) {
                    showToast('请输入店铺名称');
                    return;
                }
                
                if (!industry) {
                    showToast('请选择所属行业');
                    return;
                }
                
                if (!address) {
                    showToast('请输入详细地址');
                    return;
                }
                
                if (!community) {
                    showToast('请选择所在社区');
                    return;
                }
                
                formData.shopName = shopName;
                formData.industry = industry;
                formData.address = address;
                formData.community = community;
                formData.openTime = document.getElementById('open-time').value;
                formData.closeTime = document.getElementById('close-time').value;
                formData.location = formData.location || null;
                
                // 完成注册
                completeRegister();
                return;
            }
            
            // 切换到下一步
            document.getElementById(`step-${step}`).classList.add('hidden');
            document.getElementById(`step-${step + 1}`).classList.remove('hidden');
            
            // 更新步骤指示器
            document.querySelector(`.step-item[data-step="${step}"]`).classList.remove('active');
            document.querySelector(`.step-item[data-step="${step}"]`).classList.add('completed');
            document.querySelector(`.step-item[data-step="${step + 1}"]`).classList.add('active');
            
            currentStep = step + 1;
        }
        
        function prevStep(step) {
            document.getElementById(`step-${step}`).classList.add('hidden');
            document.getElementById(`step-${step - 1}`).classList.remove('hidden');
            
            // 更新步骤指示器
            document.querySelector(`.step-item[data-step="${step}"]`).classList.remove('active');
            document.querySelector(`.step-item[data-step="${step - 1}"]`).classList.add('active');
            document.querySelector(`.step-item[data-step="${step - 1}"]`).classList.remove('completed');
            
            currentStep = step - 1;
        }
        
        function sendVerifyCode() {
            const phone = document.getElementById('phone').value.trim();
            
            if (!phone) {
                showToast('请先输入手机号');
                return;
            }
            
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号');
                return;
            }
            
            // 检查手机号是否已注册
            const merchants = JSON.parse(localStorage.getItem('merchants') || '[]');
            if (merchants.find(m => m.phone === phone)) {
                showToast('该手机号已注册，请直接登录');
                return;
            }
            
            // 开始倒计时
            const btn = document.getElementById('send-code-btn');
            countdown = 60;
            btn.disabled = true;
            btn.textContent = `${countdown}秒后重试`;
            btn.classList.add('bg-gray-300', 'text-gray-500');
            btn.classList.remove('bg-gray-200', 'text-gray-700');
            
            const timer = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    btn.textContent = `${countdown}秒后重试`;
                } else {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                    btn.classList.remove('bg-gray-300', 'text-gray-500');
                    btn.classList.add('bg-gray-200', 'text-gray-700');
                }
            }, 1000);
            
            showToast('验证码已发送：123456（测试用）');
        }
        
        function completeRegister() {
            // 检查是否是编辑模式
            const urlParams = new URLSearchParams(window.location.search);
            const isEditMode = urlParams.get('edit') === '1';
            
            if (isEditMode) {
                // 编辑模式：更新现有商户信息
                const currentMerchantStr = localStorage.getItem('current_merchant');
                if (currentMerchantStr) {
                    const currentMerchant = JSON.parse(currentMerchantStr);
                    
                    // 更新商户信息
                    currentMerchant.name = formData.shopName;
                    currentMerchant.industry = formData.industry;
                    currentMerchant.address = formData.address;
                    currentMerchant.logo = formData.logo || '';
                    currentMerchant.avatar = formData.logo || currentMerchant.avatar;
                    currentMerchant.businessHours = `${formData.openTime}-${formData.closeTime}`;
                    currentMerchant.community = formData.community || '';
                    currentMerchant.location = formData.location || null;
                    
                    // 更新 localStorage
                    localStorage.setItem('current_merchant', JSON.stringify(currentMerchant));
                    
                    // 更新商户列表
                    let merchants = JSON.parse(localStorage.getItem('merchants') || '[]');
                    const index = merchants.findIndex(m => m.id === currentMerchant.id);
                    if (index !== -1) {
                        merchants[index] = currentMerchant;
                        localStorage.setItem('merchants', JSON.stringify(merchants));
                    }
                    
                    showToast('店铺信息已保存！');
                    
                    // 跳转到发布页面
                    setTimeout(() => {
                        window.location.href = 'post-message/index-offline.html';
                    }, 1000);
                    return;
                }
            }
            
            // 正常注册流程：创建商家账号
            const merchant = {
                id: Date.now(),
                name: formData.shopName,
                phone: formData.phone,
                password: formData.password,
                avatar: formData.logo || `https://via.placeholder.com/100/ff9716/ffffff?text=${formData.shopName.charAt(0)}`,
                logo: formData.logo || '',
                industry: formData.industry,
                address: formData.address,
                businessHours: `${formData.openTime}-${formData.closeTime}`,
                community: formData.community || '',
                location: formData.location || null,
                createTime: new Date().toISOString()
            };
            
            // 保存到本地存储
            const merchants = JSON.parse(localStorage.getItem('merchants') || '[]');
            merchants.push(merchant);
            localStorage.setItem('merchants', JSON.stringify(merchants));
            
            // 设置当前登录商户
            localStorage.setItem('current_merchant', JSON.stringify(merchant));
            
            showToast('注册成功！');
            
            // 跳转到发布页面
            setTimeout(() => {
                window.location.href = 'post-message/index-offline.html';
            }, 1000);
        }
        
        function switchToUser() {
            window.location.href = '../resident/view-messages/index-offline.html';
        }
        
        // 处理Logo上传
        function handleLogoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 检查文件类型
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件');
                return;
            }
            
            // 检查文件大小（限制5MB）
            if (file.size > 5 * 1024 * 1024) {
                showToast('图片大小不能超过5MB');
                return;
            }
            
            // 读取并预览图片
            const reader = new FileReader();
            reader.onload = function(e) {
                const logoData = e.target.result;
                
                // 保存到formData
                formData.logo = logoData;
                
                // 显示预览
                document.getElementById('logo-preview').src = logoData;
                document.getElementById('logo-preview-container').classList.remove('hidden');
                
                showToast('图片上传成功');
            };
            reader.readAsDataURL(file);
        }
        
        // 移除Logo
        function removeLogo() {
            formData.logo = null;
            document.getElementById('logo-preview').src = '';
            document.getElementById('logo-preview-container').classList.add('hidden');
            document.getElementById('shop-logo-input').value = '';
            showToast('已移除图片');
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        init();
    </script>
</body>
</html>
