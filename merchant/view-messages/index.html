<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商圈快讯 - 查看留言</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.544.0/dist/umd/lucide.min.js"></script>
    <style>
        .message-card {
            transition: all 0.3s ease;
        }
        .message-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .reply-btn {
            transition: all 0.2s ease;
        }
        .reply-btn:hover {
            transform: scale(1.05);
        }
        .delete-btn {
            transition: all 0.2s ease;
        }
        .delete-btn:hover {
            color: #ef4444;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-50 min-h-screen">
    <div class="max-w-4xl mx-auto p-4">
        <!-- 顶部导航 -->
        <div class="sticky top-0 z-10 bg-white rounded-xl shadow-md p-4 mb-6">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-bold text-gray-900">用户留言</h1>
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400"></i>
                    <input type="text" id="search-input" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="搜索留言内容">
                </div>
            </div>
        </div>
        <div id="messages-container" class="space-y-4">
            <!-- 留言项 -->
        </div>
    </div>
    <script>
        lucide.createIcons();

        const messages = [
            { id: 1, userName: '张三', content: '你们家的咖啡真的很不错！', time: '2025-12-25 10:30', reply: '感谢您的认可，我们会继续努力！' },
            { id: 2, userName: '李四', content: '请问有什么优惠活动吗？', time: '2025-12-24 15:45', reply: '' },
            { id: 3, userName: '王五', content: '店面装修很有格调。', time: '2025-12-23 09:12', reply: '谢谢，欢迎常来！' },
            { id: 4, userName: '赵六', content: '咖啡的口感很醇厚，非常喜欢！', time: '2025-12-22 14:20', reply: '很高兴您喜欢我们的咖啡！' },
            { id: 5, userName: '钱七', content: '可以外送吗？', time: '2025-12-21 11:30', reply: '可以的，您可以通过美团或饿了么下单。' },
            { id: 6, userName: '孙八', content: '周末有什么活动吗？', time: '2025-12-20 16:45', reply: '' }
        ];

        const messagesContainer = document.getElementById('messages-container');
        const searchInput = document.getElementById('search-input');

        function renderMessages(filteredMessages = messages) {
            messagesContainer.innerHTML = '';
            
            if (filteredMessages.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="bg-white rounded-lg shadow-md p-8 text-center">
                        <i data-lucide="message-square-off" class="h-12 w-12 text-gray-400 mx-auto mb-4"></i>
                        <p class="text-gray-500">暂无留言</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }
            
            filteredMessages.forEach(msg => {
                const messageElement = document.createElement('div');
                messageElement.className = 'message-card bg-white rounded-xl shadow-md p-6';
                messageElement.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center">
                                <div class="h-10 w-10 rounded-full bg-indigo-100 flex items-center justify-center mr-3">
                                    <span class="text-indigo-600 font-medium">${msg.userName.charAt(0)}</span>
                                </div>
                                <div>
                                    <h3 class="text-lg font-semibold text-gray-900">${msg.userName}</h3>
                                    <p class="text-sm text-gray-400">${msg.time}</p>
                                </div>
                            </div>
                            <p class="text-gray-600 mt-3 pl-13">${msg.content}</p>
                        </div>
                         <button class="delete-btn text-gray-400 hover:text-gray-600" onclick="deleteMessage(${msg.id})">
                            <i data-lucide="trash-2" class="h-5 w-5"></i>
                        </button>
                    </div>
                    ${msg.reply ? `
                        <div class="mt-4 p-3 bg-indigo-50 rounded-lg ml-13">
                            <div class="flex items-center mb-1">
                                <div class="h-6 w-6 rounded-full bg-indigo-600 flex items-center justify-center mr-2">
                                    <i data-lucide="user" class="h-3 w-3 text-white"></i>
                                </div>
                                <span class="text-sm font-medium text-indigo-800">我的回复</span>
                            </div>
                            <p class="text-gray-700 ml-8">${msg.reply}</p>
                        </div>
                    ` : ''}
                    <div class="mt-4 ml-13">
                        <textarea id="reply-${msg.id}" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 resize-none" rows="2" placeholder="请输入回复...">${msg.reply}</textarea>
                        <button class="reply-btn mt-2 px-5 py-2 border border-transparent text-sm font-medium rounded-lg shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500" onclick="replyMessage(${msg.id})">回复</button>
                    </div>
                `;
                messagesContainer.appendChild(messageElement);
            });
            lucide.createIcons();
        }

        function replyMessage(id) {
            const replyContent = document.getElementById(`reply-${id}`).value.trim();
            const message = messages.find(msg => msg.id === id);
            if (message) {
                message.reply = replyContent;
                renderMessages();
                // 给用户反馈
                const replyBtn = document.querySelector(`[onclick="replyMessage(${id})"]`);
                if (replyBtn) {
                    replyBtn.textContent = '已回复';
                    replyBtn.classList.add('bg-green-600');
                    replyBtn.classList.remove('bg-indigo-600');
                    setTimeout(() => {
                        replyBtn.textContent = '回复';
                        replyBtn.classList.remove('bg-green-600');
                        replyBtn.classList.add('bg-indigo-600');
                    }, 2000);
                }
            }
        }
        
        function deleteMessage(id) {
            if (confirm('确定要删除这条留言吗？')) {
                const index = messages.findIndex(msg => msg.id === id);
                if (index > -1) {
                    messages.splice(index, 1);
                    renderMessages();
                }
            }
        }
        
        // 搜索功能
        function filterMessages() {
            const searchTerm = searchInput.value.toLowerCase();
            const filtered = messages.filter(msg => 
                msg.userName.toLowerCase().includes(searchTerm) || 
                msg.content.toLowerCase().includes(searchTerm) ||
                msg.reply.toLowerCase().includes(searchTerm)
            );
            renderMessages(filtered);
        }
        
        searchInput.addEventListener('input', filterMessages);

        renderMessages();
    </script>
</body>
</html>
