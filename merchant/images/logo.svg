<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 好社区 Logo SVG -->
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
  </defs>
  
  <!-- 红色图形部分 - 100形状 -->
  <g transform="translate(100, 85)">
    <!-- 左边的火焰/飘带形状 -->
    <path d="M-35,-30 Q-45,-50 -35,-65 Q-25,-80 -15,-70 Q-5,-60 -15,-40 Q-25,-20 -35,0 Q-40,20 -35,40 Q-30,60 -20,50 L-10,40 Q-20,30 -25,15 Q-30,0 -35,-30 Z" 
          fill="url(#redGradient)"/>
    
    <!-- 中间的第一个0 -->
    <ellipse cx="5" cy="0" rx="25" ry="35" fill="none" stroke="url(#redGradient)" stroke-width="18"/>
    
    <!-- 右边的第二个0 -->
    <ellipse cx="50" cy="0" rx="25" ry="35" fill="none" stroke="url(#redGradient)" stroke-width="18"/>
  </g>
  
  <!-- 底部弧线 -->
  <path d="M20,160 Q100,190 180,160" fill="none" stroke="url(#redGradient)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- 文字部分 -->
  <g transform="translate(100, 175)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#orangeGradient)">好社区</text>
  </g>
</svg>