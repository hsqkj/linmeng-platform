<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 邻盟营销助手</title>
    <link rel="stylesheet" href="../../css/output.css">
    <style>
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        .stat-card {
            transition: all 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .icon-lg {
            width: 32px;
            height: 32px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white sticky top-0 z-50 shadow-sm">
            <div class="px-4 py-3">
                <div class="flex items-center justify-between">
                    <button onclick="window.history.back()" class="p-2 hover:bg-gray-100 rounded-lg">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </button>
                    <h1 class="text-lg font-bold text-gray-900">数据统计</h1>
                    <button onclick="exportData()" class="p-2 hover:bg-gray-100 rounded-lg">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="p-4">
            <div class="mb-4">
                <div class="flex items-center space-x-2">
                    <button class="time-filter active px-4 py-2 bg-orange-600 text-white rounded-lg text-sm font-medium" data-days="7">近7天</button>
                    <button class="time-filter px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium" data-days="30">近30天</button>
                    <button class="time-filter px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium" data-days="90">近90天</button>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="stat-card bg-white rounded-xl p-4 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-gray-500">总浏览量</span>
                        <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center">
                            <svg class="icon text-blue-600" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </div>
                    </div>
                    <p class="text-2xl font-bold text-gray-900" id="total-views">0</p>
                    <p class="text-xs text-green-600 mt-1">↑ 12.5%</p>
                </div>
                
                <div class="stat-card bg-white rounded-xl p-4 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-gray-500">总点赞数</span>
                        <div class="w-8 h-8 bg-red-100 rounded-lg flex items-center justify-center">
                            <svg class="icon text-red-600" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                        </div>
                    </div>
                    <p class="text-2xl font-bold text-gray-900" id="total-likes">0</p>
                    <p class="text-xs text-green-600 mt-1">↑ 8.3%</p>
                </div>
                
                <div class="stat-card bg-white rounded-xl p-4 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-gray-500">总分享数</span>
                        <div class="w-8 h-8 bg-purple-100 rounded-lg flex items-center justify-center">
                            <svg class="icon text-purple-600" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                        </div>
                    </div>
                    <p class="text-2xl font-bold text-gray-900" id="total-shares">0</p>
                    <p class="text-xs text-green-600 mt-1">↑ 15.2%</p>
                </div>
                
                <div class="stat-card bg-white rounded-xl p-4 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-gray-500">总评论数</span>
                        <div class="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center">
                            <svg class="icon text-green-600" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        </div>
                    </div>
                    <p class="text-2xl font-bold text-gray-900" id="total-comments">0</p>
                    <p class="text-xs text-green-600 mt-1">↑ 6.7%</p>
                </div>
                
                <div class="stat-card bg-white rounded-xl p-4 shadow-sm col-span-2">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-gray-500">总订单数</span>
                        <div class="w-8 h-8 bg-orange-100 rounded-lg flex items-center justify-center">
                            <svg class="icon text-orange-600" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                        </div>
                    </div>
                    <div class="flex items-end justify-between">
                        <div>
                            <p class="text-2xl font-bold text-gray-900" id="total-orders">0</p>
                            <p class="text-xs text-green-600 mt-1">↑ 18.9%</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-gray-500">预估收入</p>
                            <p class="text-lg font-bold text-orange-600" id="estimated-revenue">¥0</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mb-6">
                <h2 class="text-lg font-bold text-gray-900 mb-3">活动数据</h2>
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div id="activity-stats" class="divide-y divide-gray-100">
                    </div>
                </div>
            </div>
            
            <div class="mb-6">
                <h2 class="text-lg font-bold text-gray-900 mb-3">渠道效果</h2>
                <div class="bg-white rounded-xl shadow-sm p-4">
                    <div class="space-y-4">
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-600">朋友圈</span>
                                <span class="text-sm font-medium text-gray-900">45%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-orange-600 h-2 rounded-full" style="width: 45%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-600">抖音</span>
                                <span class="text-sm font-medium text-gray-900">28%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-orange-500 h-2 rounded-full" style="width: 28%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-600">小红书</span>
                                <span class="text-sm font-medium text-gray-900">15%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-orange-400 h-2 rounded-full" style="width: 15%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-600">益邻邻小程序</span>
                                <span class="text-sm font-medium text-gray-900">8%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-orange-300 h-2 rounded-full" style="width: 8%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-600">好社区惠民社群</span>
                                <span class="text-sm font-medium text-gray-900">4%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-orange-200 h-2 rounded-full" style="width: 4%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div>
                <h2 class="text-lg font-bold text-gray-900 mb-3">用户画像</h2>
                <div class="bg-white rounded-xl shadow-sm p-4">
                    <div class="grid grid-cols-3 gap-4">
                        <div class="text-center">
                            <p class="text-2xl font-bold text-gray-900">65%</p>
                            <p class="text-xs text-gray-500 mt-1">女性用户</p>
                        </div>
                        <div class="text-center">
                            <p class="text-2xl font-bold text-gray-900">35%</p>
                            <p class="text-xs text-gray-500 mt-1">男性用户</p>
                        </div>
                        <div class="text-center">
                            <p class="text-2xl font-bold text-gray-900">28岁</p>
                            <p class="text-xs text-gray-500 mt-1">平均年龄</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        let currentDays = 7;
        
        const activities = [
            {
                id: 1,
                title: '【新店开业】鲜果时光欢迎到店，开业大礼等您来',
                templateType: 'new-store',
                views: 128,
                likes: 45,
                shares: 23,
                comments: 12,
                orders: 8,
                publishTime: '2026-03-08'
            },
            {
                id: 2,
                title: '【限时折扣】特价促销，限时抢购',
                templateType: 'discount',
                views: 256,
                likes: 89,
                shares: 45,
                comments: 23,
                orders: 15,
                publishTime: '2026-03-07'
            },
            {
                id: 3,
                title: '【上门服务】家政服务，专业便捷',
                templateType: 'service',
                views: 189,
                likes: 67,
                shares: 34,
                comments: 18,
                orders: 12,
                publishTime: '2026-03-06'
            },
            {
                id: 4,
                title: '【拼团集赞】拉新引流，分享有礼',
                templateType: 'group-buy',
                views: 345,
                likes: 123,
                shares: 67,
                comments: 34,
                orders: 25,
                publishTime: '2026-03-05'
            },
            {
                id: 5,
                title: '【套餐优惠】美容套餐，超值划算',
                templateType: 'package',
                views: 234,
                likes: 78,
                shares: 41,
                comments: 22,
                orders: 18,
                publishTime: '2026-03-04'
            }
        ];
        
        function init() {
            loadStatistics();
            setupEventListeners();
        }
        
        function setupEventListeners() {
            const timeFilters = document.querySelectorAll('.time-filter');
            timeFilters.forEach(filter => {
                filter.addEventListener('click', () => {
                    timeFilters.forEach(f => {
                        f.classList.remove('active', 'bg-orange-600', 'text-white');
                        f.classList.add('bg-gray-200', 'text-gray-700');
                    });
                    filter.classList.add('active', 'bg-orange-600', 'text-white');
                    filter.classList.remove('bg-gray-200', 'text-gray-700');
                    
                    currentDays = parseInt(filter.dataset.days);
                    loadStatistics();
                });
            });
        }
        
        function loadStatistics() {
            const filteredActivities = filterActivitiesByDays(activities, currentDays);
            
            const totalViews = filteredActivities.reduce((sum, a) => sum + a.views, 0);
            const totalLikes = filteredActivities.reduce((sum, a) => sum + a.likes, 0);
            const totalShares = filteredActivities.reduce((sum, a) => sum + a.shares, 0);
            const totalComments = filteredActivities.reduce((sum, a) => sum + a.comments, 0);
            const totalOrders = filteredActivities.reduce((sum, a) => sum + a.orders, 0);
            
            document.getElementById('total-views').textContent = totalViews;
            document.getElementById('total-likes').textContent = totalLikes;
            document.getElementById('total-shares').textContent = totalShares;
            document.getElementById('total-comments').textContent = totalComments;
            document.getElementById('total-orders').textContent = totalOrders;
            document.getElementById('estimated-revenue').textContent = '¥' + (totalOrders * 50).toLocaleString();
            
            loadActivityStats(filteredActivities);
        }
        
        function filterActivitiesByDays(activities, days) {
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - days);
            
            return activities.filter(activity => {
                const publishDate = new Date(activity.publishTime);
                return publishDate >= cutoffDate;
            });
        }
        
        function loadActivityStats(activities) {
            const container = document.getElementById('activity-stats');
            container.innerHTML = '';
            
            if (activities.length === 0) {
                container.innerHTML = `
                    <div class="p-8 text-center text-gray-500">
                        <p>暂无数据</p>
                    </div>
                `;
                return;
            }
            
            activities.forEach(activity => {
                const row = document.createElement('div');
                row.className = 'p-4 hover:bg-gray-50 cursor-pointer';
                row.onclick = () => showActivityDetail(activity);
                
                const templateNames = {
                    'new-store': '新店开业',
                    'discount': '限时折扣',
                    'package': '套餐优惠',
                    'service': '上门服务',
                    'group-buy': '拼团集赞'
                };
                
                row.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="font-medium text-gray-900 text-sm line-clamp-1">${activity.title}</h3>
                        <span class="text-xs text-gray-500">${templateNames[activity.templateType]}</span>
                    </div>
                    <div class="flex items-center justify-between text-xs text-gray-500">
                        <div class="flex items-center space-x-3">
                            <span>浏览 ${activity.views}</span>
                            <span>点赞 ${activity.likes}</span>
                            <span>分享 ${activity.shares}</span>
                            <span>评论 ${activity.comments}</span>
                            <span>订单 ${activity.orders}</span>
                        </div>
                        <span>${activity.publishTime}</span>
                    </div>
                `;
                
                container.appendChild(row);
            });
        }
        
        function showActivityDetail(activity) {
            showToast('活动详情页面开发中');
        }
        
        function exportData() {
            const filteredActivities = filterActivitiesByDays(activities, currentDays);
            
            const csvContent = generateCSV(filteredActivities);
            downloadCSV(csvContent, `数据统计_${currentDays}天.csv`);
            
            showToast('数据导出成功');
        }
        
        function generateCSV(activities) {
            const headers = ['活动标题', '模板类型', '浏览量', '点赞数', '分享数', '评论数', '订单数', '发布时间'];
            const rows = activities.map(activity => [
                activity.title,
                activity.templateType,
                activity.views,
                activity.likes,
                activity.shares,
                activity.comments,
                activity.orders,
                activity.publishTime
            ]);
            
            return [headers, ...rows].map(row => row.join(',')).join('\n');
        }
        
        function downloadCSV(content, filename) {
            const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        init();
    </script>
</body>
</html>
