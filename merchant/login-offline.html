            <div class="mt-8 text-center">

                        'https://images.unsplash.com/photo-1528825871115-3581a5387919?w=400&h=300&fit=crop',

                },
                {

                    merchantName: merchant.name,
                    merchantAvatar: merchant.avatar,
                    title: '🎁 会员专享！积分双倍送',
                    content: '👑 亲爱的会员朋友们：\n\n🎉 本月会员专享福利来啦！\n\n✅ 会员特权：\n• 全场商品9折优惠\n• 积分双倍送（消费1元积2分）\n• 生日当月额外赠送100积分\n• 100积分可兑换精美礼品一份\n\n🎁 本月推荐：\n• 进口水果礼盒 会员价88元\n• 有机蔬菜组合 会员价35元\n• 鲜榨果汁系列 会员价第二杯半价\n\n成为会员，享受更多优惠！',

                        'https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&h=300&fit=crop',

                    tags: ['会员专享', '积分兑换'],

        function init() {
            initDefaultMerchant();
            
            // 检查是否已登录
            const currentMerchant = localStorage.getItem('current_merchant');
            if (currentMerchant) {
                window.location.href = 'post-message/index-offline.html';
                return;
            }
            
            setupEventListeners();
        }
        
        // 验证码倒计时
        let countdown = 0;
        let countdownTimer = null;
        
        function setupEventListeners() {
            const loginForm = document.getElementById('login-form');
            loginForm.addEventListener('submit', handleLogin);
        }
        
        // 发送验证码
        function sendVerifyCode() {
            const phone = document.getElementById('phone').value.trim();
            
            if (!phone) {
                showToast('请先输入手机号');
                return;
            }
            
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号');
                return;
            }
            
            if (countdown > 0) {
                return;
            }
            
            // 模拟发送验证码
            showToast('验证码已发送：123456');
            
            // 自动填入验证码（演示用）
            document.getElementById('verify-code').value = '123456';
            
            // 开始倒计时
            countdown = 60;
            const btn = document.getElementById('send-code-btn');
            btn.textContent = `${countdown}s后重试`;
            btn.disabled = true;
            btn.classList.add('opacity-50');
            
            countdownTimer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(countdownTimer);
                    btn.textContent = '获取验证码';
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                } else {
                    btn.textContent = `${countdown}s后重试`;
                }
            }, 1000);
        }
        
        // 手机号+验证码登录
        function handleLogin(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const verifyCode = document.getElementById('verify-code').value.trim();
            
            if (!phone) {
                showToast('请输入手机号');
                return;
            }
            
            if (!verifyCode) {
                showToast('请输入验证码');
                return;
            }
            
            // 验证手机号格式
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号');
                return;
            }
            
            // 验证验证码（演示用，固定123456）
            if (verifyCode !== '123456') {
                showToast('验证码错误');
                return;
            }
            
            // 查找或创建商家
            let merchants = JSON.parse(localStorage.getItem('merchants') || '[]');
            let merchant = merchants.find(m => m.phone === phone);
            
            if (merchant) {
                // 已存在，登录成功
                localStorage.setItem('current_merchant', JSON.stringify(merchant));
                showToast('登录成功！');
            } else {
                // 新用户，自动注册
                merchant = {
                    id: Date.now(),
                    name: '我的店铺',
                    phone: phone,
                    avatar: 'images/logo.png',
                    logo: 'images/logo.png',
                    industry: '零售',
                    address: '',
                    businessHours: '09:00-21:00',
                    description: '优质商家，服务社区',
                    createTime: new Date().toISOString()
                };
                merchants.push(merchant);
                localStorage.setItem('merchants', JSON.stringify(merchants));
                localStorage.setItem('current_merchant', JSON.stringify(merchant));
                showToast('注册成功！请完善店铺信息');
                
                // 新用户注册后跳转到商家信息完善页面
                setTimeout(() => {
                    window.location.href = 'register-offline.html?edit=1';
                }, 1000);
                return;
            }
            
            // 已有用户登录后跳转到发布页面
            setTimeout(() => {
                window.location.href = 'post-message/index-offline.html';
            }, 1000);
        }
        
        // 微信登录
        function wechatLogin() {
            showToast('正在唤起微信登录...');
            
            // 模拟微信登录成功
            setTimeout(() => {
                const mockOpenId = 'wx_' + Date.now();
                let merchants = JSON.parse(localStorage.getItem('merchants') || '[]');
                let merchant = merchants.find(m => m.wechatOpenId === mockOpenId);
                
                if (!merchant) {
                    // 新用户，自动注册
                    merchant = {
                        id: Date.now(),
                        name: '微信用户店铺',
                        phone: '',
                        wechatOpenId: mockOpenId,
                        avatar: 'images/logo.png',
                        logo: 'images/logo.png',
                        industry: '零售',
                        address: '',
                        businessHours: '09:00-21:00',
                        description: '微信授权商家',
                        createTime: new Date().toISOString()
                    };
                    merchants.push(merchant);
                    localStorage.setItem('merchants', JSON.stringify(merchants));
                    localStorage.setItem('current_merchant', JSON.stringify(merchant));
                    showToast('注册成功！请完善店铺信息');
                    
                    // 新用户注册后跳转到商家信息完善页面
                    setTimeout(() => {
                        window.location.href = 'register-offline.html?edit=1';
                    }, 1000);
                    return;
                }
                
                localStorage.setItem('current_merchant', JSON.stringify(merchant));
                showToast('微信登录成功！');
                
                // 已有用户登录后跳转到发布页面
                setTimeout(() => {
                    window.location.href = 'post-message/index-offline.html';
                }, 1000);
            }, 1500);
        }
        
        function switchToUser() {
            window.location.href = '../resident/view-messages/index-offline.html';
        }
        
        function switchToUser() {
            window.location.href = '../resident/view-messages/index-offline.html';
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        init();
    </script>
</body>
